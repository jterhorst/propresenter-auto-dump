name: Extract ProPresenter Protos

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-extraction even if version unchanged'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  extract:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read last known version
        id: last_version
        run: |
          if [ -f latest_version.txt ]; then
            VERSION=$(sed -n '1p' latest_version.txt)
            BUILD_NUMBER=$(sed -n '2p' latest_version.txt)
          else
            VERSION=7
            BUILD_NUMBER=117440539
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Last known: version=$VERSION, build=$BUILD_NUMBER"

      - name: Fetch latest version info
        id: upgrade
        run: |
          # Always query from v7 baseline to ensure we get the full upgrade list
          RESPONSE=$(curl -s "https://api.renewedvision.com/v1/pro/upgrade?platform=macos&osVersion=26&appVersion=7&buildNumber=117440539&includeNotes=false")

          UPGRADE_COUNT=$(echo "$RESPONSE" | jq '.upgrades | length')

          if [ "$UPGRADE_COUNT" -eq 0 ]; then
            echo "ERROR: API returned no upgrades even from v7 baseline. Aborting."
            echo "has_version=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found $UPGRADE_COUNT upgrades. Picking the newest (first entry)."

          # API returns newest first — index 0 is the latest
          LATEST=$(echo "$RESPONSE" | jq '.upgrades[0]')
          echo "--- Latest upgrade entry ---"
          echo "$LATEST" | jq .
          DOWNLOAD_URL=$(echo "$LATEST" | jq -r '.downloadUrl')
          VERSION=$(echo "$LATEST" | jq -r '.version')
          BUILD_NUMBER=$(echo "$LATEST" | jq -r '.buildNumber')

          # Validate required fields
          if [ "$BUILD_NUMBER" = "null" ] || [ -z "$BUILD_NUMBER" ]; then
            echo "ERROR: buildNumber is null/empty. Aborting."
            echo "has_version=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$VERSION" = "null" ] || [ -z "$VERSION" ]; then
            echo "ERROR: version is null/empty. Aborting."
            echo "has_version=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$DOWNLOAD_URL" = "null" ] || [ -z "$DOWNLOAD_URL" ]; then
            echo "ERROR: downloadUrl is null/empty. Aborting."
            echo "has_version=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if this version is already extracted
          LAST_BUILD="${{ steps.last_version.outputs.build_number }}"
          FORCE="${{ github.event.inputs.force }}"
          if [ "$BUILD_NUMBER" = "$LAST_BUILD" ] && [ "$FORCE" != "true" ]; then
            echo "Version $VERSION (build $BUILD_NUMBER) already extracted. Skipping."
            echo "has_version=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_version=true" >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

          echo "Latest version: $VERSION (build $BUILD_NUMBER)"

      - name: Set up Python
        if: steps.upgrade.outputs.has_version == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        if: steps.upgrade.outputs.has_version == 'true'
        run: pip install protobuf

      - name: Download ProPresenter
        if: steps.upgrade.outputs.has_version == 'true'
        run: |
          curl -L -o propresenter.zip "${{ steps.upgrade.outputs.download_url }}"
          echo "Downloaded: ${{ steps.upgrade.outputs.download_url }}"

      - name: Extract app bundle
        if: steps.upgrade.outputs.has_version == 'true'
        run: |
          unzip -q propresenter.zip
          APP_PATH=$(find . -maxdepth 2 -name "ProPresenter.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          echo "app_path=$APP_PATH" >> "$GITHUB_ENV"

      - name: Extract protos from binary
        if: steps.upgrade.outputs.has_version == 'true'
        run: |
          BINARY_PATH="${app_path}/Contents/MacOS/ProPresenter"
          echo "Binary info:"
          ls -la "$BINARY_PATH"
          file "$BINARY_PATH"

          # Extract arm64 slice from universal binary
          lipo "$BINARY_PATH" -thin arm64 -output ProPresenter_arm64
          echo "ARM64 slice:"
          ls -la ProPresenter_arm64
          file ProPresenter_arm64

          # Try extracting from all Mach-O binaries in the bundle
          BINARIES_TO_SCAN="ProPresenter_arm64"

          # Also extract arm64 from ProCore framework if present
          PROCORE="${app_path}/Contents/Frameworks/ProCore.framework/Versions/A/ProCore"
          if [ -f "$PROCORE" ]; then
            echo ""
            echo "ProCore framework:"
            file "$PROCORE"
            if file "$PROCORE" | grep -q 'universal'; then
              lipo "$PROCORE" -thin arm64 -output ProCore_arm64
            else
              cp "$PROCORE" ProCore_arm64
            fi
            BINARIES_TO_SCAN="$BINARIES_TO_SCAN ProCore_arm64"
          fi

          for bin in $BINARIES_TO_SCAN; do
            echo ""
            echo "=== Scanning: $bin ==="
            python3 scripts/extract_protos.py "$bin" ./proto
          done

          echo ""
          if [ -d ./proto ] && [ "$(find ./proto -name '*.proto' -type f | wc -l)" -gt 0 ]; then
            echo "--- Extracted .proto files ---"
            find ./proto -name '*.proto' -type f | sort
            echo ""
            echo "Total: $(find ./proto -name '*.proto' -type f | wc -l | tr -d ' ') .proto files"
          else
            echo "No .proto files extracted."
          fi

      - name: Install protoc and swift-protobuf
        if: steps.upgrade.outputs.has_version == 'true'
        run: brew install protobuf swift-protobuf

      - name: Generate Swift, Ruby, and C++ code
        if: steps.upgrade.outputs.has_version == 'true'
        run: |
          if [ -d ./proto ] && [ "$(find ./proto -name '*.proto' -type f | wc -l)" -gt 0 ]; then
            mkdir -p swift ruby cpp
            TOTAL=0
            FAILED=0
            for f in proto/*.proto; do
              TOTAL=$((TOTAL + 1))
              if ! protoc \
                --proto_path=proto \
                --swift_out=swift \
                --swift_opt=Visibility=Public \
                --ruby_out=ruby \
                --cpp_out=cpp \
                "$f" 2>/dev/null; then
                FAILED=$((FAILED + 1))
                echo "Skipped $(basename "$f") (compile error)"
              fi
            done
            echo ""
            echo "Compiled $((TOTAL - FAILED))/$TOTAL proto files ($FAILED skipped)"
            echo "Generated Swift files: $(find swift -name '*.pb.swift' | wc -l | tr -d ' ')"
            echo "Generated Ruby files: $(find ruby -name '*_pb.rb' | wc -l | tr -d ' ')"
            echo "Generated C++ files: $(find cpp -name '*.pb.h' | wc -l | tr -d ' ') headers, $(find cpp -name '*.pb.cc' | wc -l | tr -d ' ') sources"
          else
            echo "No proto files found, skipping code generation."
          fi

      - name: Run Swift tests
        if: steps.upgrade.outputs.has_version == 'true'
        run: |
          if [ -d ./swift ] && [ "$(find swift -name '*.pb.swift' | wc -l)" -gt 0 ]; then
            swift test
          else
            echo "No Swift files found, skipping tests."
          fi

      - name: Update version marker
        if: steps.upgrade.outputs.has_version == 'true'
        run: |
          NEW_VERSION="${{ steps.upgrade.outputs.version }}"
          NEW_BUILD_NUMBER="${{ steps.upgrade.outputs.build_number }}"
          if [ "$NEW_VERSION" = "null" ] || [ -z "$NEW_VERSION" ] || [ "$NEW_BUILD_NUMBER" = "null" ] || [ -z "$NEW_BUILD_NUMBER" ]; then
            echo "ERROR: Refusing to write null/empty values to latest_version.txt"
            echo "  version='$NEW_VERSION' build_number='$NEW_BUILD_NUMBER'"
            exit 1
          fi
          echo "$NEW_VERSION" > latest_version.txt
          echo "$NEW_BUILD_NUMBER" >> latest_version.txt
          echo "Updated version marker to version=$NEW_VERSION, buildNumber=$NEW_BUILD_NUMBER"

      - name: Commit and push
        if: steps.upgrade.outputs.has_version == 'true'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -d proto ] && git add proto/
          [ -d swift ] && git add swift/
          [ -d ruby ] && git add ruby/
          [ -d cpp ] && git add cpp/
          git add latest_version.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Extract protos from ProPresenter ${{ steps.upgrade.outputs.version }} (build ${{ steps.upgrade.outputs.build_number }})"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag Swift package version
        if: steps.commit.outputs.committed == 'true'
        run: |
          VERSION="${{ steps.upgrade.outputs.version }}"

          # Pad to semver (e.g. "21" -> "21.0.0", "21.2" -> "21.2.0")
          DOT_COUNT=$(echo "$VERSION" | tr -cd '.' | wc -c | tr -d ' ')
          if [ "$DOT_COUNT" -eq 0 ]; then
            SEMVER="${VERSION}.0.0"
          elif [ "$DOT_COUNT" -eq 1 ]; then
            SEMVER="${VERSION}.0"
          else
            SEMVER="$VERSION"
          fi

          echo "Tagging as $SEMVER (ProPresenter $VERSION)"

          # Delete existing tag if force re-extracting the same version
          if git rev-parse "$SEMVER" >/dev/null 2>&1; then
            echo "Tag $SEMVER already exists, updating it."
            git tag -d "$SEMVER"
            git push origin ":refs/tags/$SEMVER"
          fi

          git tag "$SEMVER"
          git push origin "$SEMVER"
          echo "Published Swift package version $SEMVER"
