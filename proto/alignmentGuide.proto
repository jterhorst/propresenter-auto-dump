syntax = "proto3";


package rv.data;


import "uuid.proto";



message AlignmentGuide {
  enum GuidelineOrientation {
    GUIDELINE_ORIENTATION_HORIZONTAL = 0;
    GUIDELINE_ORIENTATION_VERTICAL = 1;
  }

  rv.data.UUID uuid = 1;
  rv.data.AlignmentGuide.GuidelineOrientation orientation = 2;
  double location = 3;
}
