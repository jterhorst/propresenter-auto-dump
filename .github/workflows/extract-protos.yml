name: Extract ProPresenter Protos

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read last known version
        id: last_version
        run: |
          if [ -f latest_version.txt ]; then
            APP_VERSION=$(sed -n '1p' latest_version.txt)
            BUILD_NUMBER=$(sed -n '2p' latest_version.txt)
          else
            APP_VERSION=7
            BUILD_NUMBER=117440539
          fi
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Fetch upgrade info
        id: upgrade
        run: |
          RESPONSE=$(curl -s "https://api.renewedvision.com/v1/pro/upgrade?platform=macos&osVersion=26&appVersion=${{ steps.last_version.outputs.app_version }}&buildNumber=${{ steps.last_version.outputs.build_number }}&includeNotes=false")

          UPGRADE_COUNT=$(echo "$RESPONSE" | jq '.upgrades | length')
          echo "upgrade_count=$UPGRADE_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$UPGRADE_COUNT" -gt 0 ]; then
            LATEST=$(echo "$RESPONSE" | jq '.upgrades[-1]')
            echo "--- Latest upgrade entry ---"
            echo "$LATEST" | jq .
            DOWNLOAD_URL=$(echo "$LATEST" | jq -r '.downloadUrl')
            VERSION=$(echo "$LATEST" | jq -r '.version')
            BUILD_NUMBER=$(echo "$LATEST" | jq -r '.buildNumber')
            APP_VERSION=$(echo "$LATEST" | jq -r '.appVersion')

            # Validate no null values for version tracking fields
            if [ "$APP_VERSION" = "null" ] || [ -z "$APP_VERSION" ]; then
              echo "WARNING: appVersion is null/empty, falling back to version field"
              APP_VERSION=$(echo "$LATEST" | jq -r '.version // empty' | cut -d. -f1)
            fi
            if [ "$BUILD_NUMBER" = "null" ] || [ -z "$BUILD_NUMBER" ]; then
              echo "ERROR: buildNumber is null/empty. Aborting."
              echo "upgrade_count=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$DOWNLOAD_URL" = "null" ] || [ -z "$DOWNLOAD_URL" ]; then
              echo "ERROR: downloadUrl is null/empty. Aborting."
              echo "upgrade_count=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
            echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

            echo "New version found: $VERSION (appVersion=$APP_VERSION, build $BUILD_NUMBER)"
          else
            echo "No new versions available."
          fi

      - name: Check if new version exists
        if: steps.upgrade.outputs.upgrade_count == '0'
        run: |
          echo "No new version found. Exiting."
          exit 0

      - name: Set up Go
        if: steps.upgrade.outputs.upgrade_count != '0'
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install protodump
        if: steps.upgrade.outputs.upgrade_count != '0'
        run: go install github.com/arkadiyt/protodump/cmd/protodump@latest

      - name: Download ProPresenter
        if: steps.upgrade.outputs.upgrade_count != '0'
        run: |
          curl -L -o propresenter.zip "${{ steps.upgrade.outputs.download_url }}"
          echo "Downloaded: ${{ steps.upgrade.outputs.download_url }}"

      - name: Extract app bundle
        if: steps.upgrade.outputs.upgrade_count != '0'
        run: |
          unzip -q propresenter.zip
          APP_PATH=$(find . -maxdepth 2 -name "ProPresenter.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          echo "app_path=$APP_PATH" >> "$GITHUB_ENV"

      - name: Run protodump
        if: steps.upgrade.outputs.upgrade_count != '0'
        run: |
          BINARY_PATH="${app_path}/Contents/MacOS/ProPresenter"
          echo "Extracting protos from: $BINARY_PATH"
          ls -la "$BINARY_PATH"
          file "$BINARY_PATH"
          mkdir -p proto
          protodump -file "$BINARY_PATH" -output ./proto 2>&1 || true
          echo "--- protodump exit code: $? ---"
          echo "--- Contents of proto/ ---"
          find ./proto -type f | head -50
          ls -laR ./proto

      - name: Update version marker
        if: steps.upgrade.outputs.upgrade_count != '0'
        run: |
          NEW_APP_VERSION="${{ steps.upgrade.outputs.app_version }}"
          NEW_BUILD_NUMBER="${{ steps.upgrade.outputs.build_number }}"
          if [ "$NEW_APP_VERSION" = "null" ] || [ -z "$NEW_APP_VERSION" ] || [ "$NEW_BUILD_NUMBER" = "null" ] || [ -z "$NEW_BUILD_NUMBER" ]; then
            echo "ERROR: Refusing to write null/empty values to latest_version.txt"
            echo "  app_version='$NEW_APP_VERSION' build_number='$NEW_BUILD_NUMBER'"
            exit 1
          fi
          echo "$NEW_APP_VERSION" > latest_version.txt
          echo "$NEW_BUILD_NUMBER" >> latest_version.txt
          echo "Updated version marker to appVersion=$NEW_APP_VERSION, buildNumber=$NEW_BUILD_NUMBER"

      - name: Commit and push
        if: steps.upgrade.outputs.upgrade_count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proto/ latest_version.txt
          git commit -m "Extract protos from ProPresenter ${{ steps.upgrade.outputs.version }} (build ${{ steps.upgrade.outputs.build_number }})"
          git push
