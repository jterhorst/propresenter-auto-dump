syntax = "proto3";


package rv.data;


import "color.proto";

import "graphicsData.proto";

import "uuid.proto";



message Mask {
  enum Mode {
    MODE_OVERLAY = 0;
    MODE_KEYHOLE = 1;
  }

  rv.data.UUID uuid = 1;
  string name = 2;
  rv.data.Color color = 3;
  rv.data.Mask.Mode mode = 4;
  repeated rv.data.Graphics.Element shapes = 5;
}
