syntax = "proto3";


package rv.analytics.powerpoint;


enum ImportType {
  SLIDES_AS_IMAGES = 0;
  TEXT_ONLY = 1;
  TEXT_AND_IMAGES = 2;
  CORE_OPEN_XML = 3;
}

enum ImportFormat {
  UNKOWN = 0;
  PPT = 1;
  PPTX = 2;
}

message ImportPowerPoint {
  rv.analytics.powerpoint.ImportType type = 1;
  rv.analytics.powerpoint.ImportFormat format = 2;
}
